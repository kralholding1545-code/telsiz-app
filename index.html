<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>TELSİZ — Kanal Ağı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<style>
  :root{
    --bg-deep:#101110;
    --bg-panel:#1c1d1a;
    --bg-panel-raised:#242520;
    --metal-edge:#3a3b34;
    --metal-edge-lo:#0a0a09;
    --amber:#ffb000;
    --amber-dim:#7a5600;
    --amber-glow: rgba(255,176,0,0.35);
    --cream:#e8dcc4;
    --cream-dim:#8f8672;
    --green:#3ddc5a;
    --green-dim:#1c5c2b;
    --red:#d94430;
    --red-dim:#7a2418;
    --red-bright:#ff5a3c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #23241f 0%, var(--bg-deep) 60%);
    color:var(--cream);
    font-family:'Oswald',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    -webkit-tap-highlight-color:transparent;
  }
  .mono{font-family:'Share Tech Mono',monospace;}

  /* ---------- ENTRY SCREEN ---------- */
  #entry{
    width:100%;max-width:420px;
    background:var(--bg-panel);
    border:1px solid var(--metal-edge);
    border-radius:14px;
    padding:36px 28px;
    text-align:center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  #entry .eyebrow{
    letter-spacing:4px;font-size:12px;color:var(--amber-dim);
    text-transform:uppercase;margin-bottom:6px;
  }
  #entry h1{
    font-size:32px;letter-spacing:3px;margin:0 0 4px;
    color:var(--amber);
    text-shadow:0 0 18px var(--amber-glow);
  }
  #entry p.sub{color:var(--cream-dim);font-size:13px;margin:0 0 28px;letter-spacing:.5px;}
  #nameInput{
    width:100%;padding:14px 16px;font-size:16px;
    background:var(--bg-deep);border:1px solid var(--metal-edge);
    border-radius:8px;color:var(--cream);font-family:'Share Tech Mono',monospace;
    letter-spacing:1px;margin-bottom:16px;outline:none;
  }
  #nameInput:focus{border-color:var(--amber-dim);}
  #joinBtn{
    width:100%;padding:15px;border:none;border-radius:8px;
    background:linear-gradient(180deg,#3a3c33,#242520);
    color:var(--amber);font-family:'Oswald';font-weight:600;
    letter-spacing:2px;font-size:15px;cursor:pointer;
    border:1px solid var(--metal-edge);
  }
  #joinBtn:active{transform:translateY(1px);}
  #joinBtn:disabled{opacity:.4;cursor:not-allowed;}
  #entryError{color:var(--red-bright);font-size:12px;margin-top:12px;min-height:14px;}

  /* ---------- MAIN APP ---------- */
  #app{display:none;width:100%;max-width:460px;}
  .radio{
    background:var(--bg-panel);
    border:1px solid var(--metal-edge);
    border-radius:16px;
    box-shadow:0 24px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.03);
    overflow:hidden;
  }
  .header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--metal-edge-lo);
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }
  .brand{font-size:15px;letter-spacing:3px;color:var(--amber);font-weight:600;}
  .brand span{color:var(--cream-dim);font-weight:400;}
  .status-dot{width:9px;height:9px;border-radius:50%;background:var(--metal-edge);
    box-shadow:0 0 0 rgba(0,0,0,0);display:inline-block;margin-right:6px;transition:.2s;}
  .status-dot.live{background:var(--green);box-shadow:0 0 10px var(--green);}
  .status-dot.tx{background:var(--red-bright);box-shadow:0 0 12px var(--red-bright);}
  .status-wrap{display:flex;align-items:center;font-size:11px;letter-spacing:1px;color:var(--cream-dim);}

  /* LCD display */
  .lcd{
    margin:16px 18px 0;padding:16px;border-radius:10px;
    background:#0d0f0a;border:1px solid var(--metal-edge-lo);
    box-shadow:inset 0 2px 8px rgba(0,0,0,0.6);
  }
  .lcd-row{display:flex;justify-content:space-between;align-items:baseline;}
  .lcd-label{font-size:10px;letter-spacing:2px;color:var(--green-dim);text-transform:uppercase;}
  .lcd-channel{font-family:'Share Tech Mono',monospace;font-size:28px;color:var(--green);
    text-shadow:0 0 8px rgba(61,220,90,0.5);letter-spacing:2px;}
  .lcd-sub{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green-dim);margin-top:2px;}

  /* Tabs */
  .tabs{display:flex;gap:0;margin:14px 18px 0;background:var(--bg-deep);
    border-radius:8px;border:1px solid var(--metal-edge-lo);overflow:hidden;}
  .tab{flex:1;text-align:center;padding:9px 0;font-size:12px;letter-spacing:1.5px;
    color:var(--cream-dim);cursor:pointer;transition:.15s;}
  .tab.active{background:var(--amber-dim);color:var(--amber);}

  /* Channel grid */
  .panel{padding:14px 18px 4px;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .ch-btn{
    aspect-ratio:1;border-radius:8px;border:1px solid var(--metal-edge);
    background:var(--bg-panel-raised);color:var(--cream-dim);
    font-family:'Share Tech Mono',monospace;font-size:15px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;
  }
  .ch-btn.active{border-color:var(--amber);color:var(--amber);box-shadow:0 0 12px var(--amber-glow);}
  .ch-btn .count{position:absolute;bottom:3px;right:5px;font-size:8px;color:var(--cream-dim);}

  /* Personal list */
  .plist{max-height:220px;overflow-y:auto;}
  .person{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;border-radius:8px;background:var(--bg-panel-raised);
    border:1px solid var(--metal-edge);margin-bottom:8px;cursor:pointer;
  }
  .person .pname{font-size:14px;letter-spacing:.5px;}
  .person .ptag{font-size:10px;color:var(--cream-dim);letter-spacing:1px;}
  .empty-msg{text-align:center;color:var(--cream-dim);font-size:12px;padding:24px 0;letter-spacing:.5px;}

  /* PTT */
  .ptt-wrap{padding:22px 18px 26px;display:flex;flex-direction:column;align-items:center;}
  #waveform{width:100%;height:40px;margin-bottom:18px;}
  #pttBtn{
    width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #e2503c, var(--red-dim) 75%);
    border:4px solid #521f16;
    box-shadow:0 10px 0 #3a140d, 0 14px 24px rgba(0,0,0,0.5);
    color:#fff;font-family:'Oswald';font-weight:700;font-size:16px;letter-spacing:2px;
    display:flex;align-items:center;justify-content:center;text-align:center;
    cursor:pointer;user-select:none;transition:transform .05s;
  }
  #pttBtn.active{
    transform:translateY(8px);
    box-shadow:0 2px 0 #3a140d, 0 6px 16px rgba(217,68,48,0.5);
    background:radial-gradient(circle at 35% 30%, #ff6a4d, var(--red) 75%);
  }
  #pttBtn:disabled{opacity:.35;cursor:not-allowed;}
  .ptt-hint{margin-top:12px;font-size:11px;letter-spacing:1.5px;color:var(--cream-dim);}
  .leave-btn{
    margin-top:16px;background:none;border:1px solid var(--metal-edge);
    color:var(--cream-dim);padding:8px 16px;border-radius:6px;font-size:11px;
    letter-spacing:1.5px;cursor:pointer;font-family:'Oswald';
  }

  /* Incoming call toast */
  #invite{
    display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--bg-panel);border:1px solid var(--amber-dim);border-radius:12px;
    padding:16px 18px;box-shadow:0 12px 30px rgba(0,0,0,0.5);z-index:50;
    width:calc(100% - 40px);max-width:400px;
  }
  #invite .inv-title{font-size:12px;color:var(--amber);letter-spacing:1.5px;margin-bottom:10px;}
  #invite .inv-actions{display:flex;gap:10px;}
  #invite button{flex:1;padding:10px;border-radius:6px;border:none;font-family:'Oswald';
    font-weight:600;letter-spacing:1px;cursor:pointer;}
  #invite .accept{background:var(--green-dim);color:var(--green);}
  #invite .decline{background:var(--red-dim);color:var(--red-bright);}

  #toast{
    display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:var(--bg-panel);border:1px solid var(--metal-edge);color:var(--cream);
    padding:10px 16px;border-radius:8px;font-size:12px;letter-spacing:1px;z-index:60;
  }
</style>
</head>
<body>

<!-- ENTRY -->
<div id="entry">
  <div class="eyebrow">Şebeke Bağlantısı</div>
  <h1 class="mono">TELSİZ</h1>
  <p class="sub">Frekansa katıl, konuşmaya başla</p>
  <input id="nameInput" class="mono" maxlength="16" placeholder="RUMUZUNU YAZ" autocomplete="off" />
  <button id="joinBtn">ŞEBEKEYE BAĞLAN</button>
  <div id="entryError"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="radio">
    <div class="header">
      <div class="brand">TELSİZ <span id="myName"></span></div>
      <div class="status-wrap"><span id="statusDot" class="status-dot"></span><span id="statusText">BAĞLI DEĞİL</span></div>
    </div>

    <div class="lcd">
      <div class="lcd-row">
        <div>
          <div class="lcd-label">Aktif Frekans</div>
          <div class="lcd-channel mono" id="lcdChannel">— — —</div>
        </div>
        <div style="text-align:right">
          <div class="lcd-label">Dinleyen</div>
          <div class="lcd-channel mono" id="lcdCount" style="font-size:22px;">0</div>
        </div>
      </div>
      <div class="lcd-sub" id="lcdSub">seçim bekleniyor</div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="channels">KANALLAR</div>
      <div class="tab" data-tab="personal">ŞAHSİ</div>
    </div>

    <div class="panel" id="channelsPanel">
      <div class="grid" id="channelGrid"></div>
    </div>

    <div class="panel" id="personalPanel" style="display:none;">
      <div class="plist" id="personList"></div>
    </div>

    <div class="ptt-wrap">
      <canvas id="waveform" width="400" height="80"></canvas>
      <button id="pttBtn" disabled>BASILI<br/>TUT</button>
      <div class="ptt-hint" id="pttHint">bir kanal veya kişi seç</div>
      <button class="leave-btn" id="leaveBtn" style="display:none;">FREKANSTAN AYRIL</button>
    </div>
  </div>
</div>

<div id="invite">
  <div class="inv-title mono" id="inviteText">ÇAĞRI ALINIYOR...</div>
  <div class="inv-actions">
    <button class="accept" id="inviteAccept">KABUL ET</button>
    <button class="decline" id="inviteDecline">REDDET</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ============================================================
   AYAR — kendi LiveKit Cloud projenin WebSocket adresini gir.
   LiveKit Cloud panelinden alacaksın (örn: wss://xxxx.livekit.cloud)
   ============================================================ */
const LIVEKIT_URL = "wss://telsiz-mj2d3nhn.livekit.cloud";
const TOKEN_ENDPOINT = "/api/token";
const CHANNEL_COUNT = 10;
const LOBBY_ROOM = "telsiz-lobby";

const { Room, RoomEvent, Track, createLocalTracks } = LivekitClient;

let myIdentity = null;
let myDisplayName = null;

let lobbyRoom = null;      // presence + davet için sürekli bağlı kalan oda
let activeRoom = null;     // o an konuşulan kanal/DM
let activeRoomName = null;
let activeRoomKind = null; // 'channel' | 'dm'
let activeChannelNumber = null;

let micTrack = null;
let isTransmitting = false;
let audioCtx, analyser, waveformRAF;

const onlineUsers = new Map(); // identity -> displayName (lobby participants)

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.style.display='none', 3000);
}

/* ---------------- ENTRY ---------------- */
document.getElementById('joinBtn').addEventListener('click', enterApp);
document.getElementById('nameInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') enterApp();
});

async function enterApp(){
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  const errEl = document.getElementById('entryError');
  errEl.textContent = '';

  if(!name){ errEl.textContent = 'Bir rumuz yazmalısın.'; return; }
  if(LIVEKIT_URL.includes('YOUR-PROJECT')){
    errEl.textContent = 'Kurulum eksik: index.html içinde LIVEKIT_URL henüz ayarlanmamış.';
    return;
  }

  document.getElementById('joinBtn').disabled = true;
  try{
    myDisplayName = name;
    await connectLobby(name);
    document.getElementById('entry').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('myName').textContent = '· ' + name;
    buildChannelGrid();
  }catch(err){
    errEl.textContent = 'Bağlanılamadı: ' + (err.message || err);
    document.getElementById('joinBtn').disabled = false;
  }
}

/* ---------------- TOKEN ---------------- */
async function fetchToken(room, identity){
  const res = await fetch(TOKEN_ENDPOINT, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ room, identity })
  });
  if(!res.ok){
    const body = await res.json().catch(()=>({}));
    throw new Error(body.error || 'Token alınamadı');
  }
  return res.json();
}

/* ---------------- LOBBY (presence + davet) ---------------- */
async function connectLobby(name){
  const { token, identity } = await fetchToken(LOBBY_ROOM, name);
  myIdentity = identity;

  lobbyRoom = new Room();
  await lobbyRoom.connect(LIVEKIT_URL, token);

  // Lobide mikrofon YOK, sadece varlık + veri kanalı.
  refreshOnlineUsers();

  lobbyRoom.on(RoomEvent.ParticipantConnected, refreshOnlineUsers);
  lobbyRoom.on(RoomEvent.ParticipantDisconnected, refreshOnlineUsers);
  lobbyRoom.on(RoomEvent.DataReceived, (payload, participant)=>{
    try{
      const msg = JSON.parse(new TextDecoder().decode(payload));
      if(msg.type === 'call-invite'){
        showInvite(msg.fromName, msg.roomName);
      }
    }catch(e){}
  });

  setStatus('BAĞLI', false);
}

function refreshOnlineUsers(){
  onlineUsers.clear();
  if(lobbyRoom){
    lobbyRoom.remoteParticipants.forEach(p=>{
      onlineUsers.set(p.identity, p.name || p.identity);
    });
  }
  if(document.querySelector('.tab[data-tab="personal"]').classList.contains('active')){
    renderPersonList();
  }
}

/* ---------------- UI: TABS ---------------- */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const isChannels = tab.dataset.tab === 'channels';
    document.getElementById('channelsPanel').style.display = isChannels ? 'block' : 'none';
    document.getElementById('personalPanel').style.display = isChannels ? 'none' : 'block';
    if(!isChannels) renderPersonList();
  });
});

function buildChannelGrid(){
  const grid = document.getElementById('channelGrid');
  grid.innerHTML = '';
  for(let i=1;i<=CHANNEL_COUNT;i++){
    const btn = document.createElement('div');
    btn.className = 'ch-btn mono';
    btn.textContent = i.toString().padStart(2,'0');
    btn.dataset.ch = i;
    btn.addEventListener('click', ()=> joinChannel(i));
    grid.appendChild(btn);
  }
}

function renderPersonList(){
  const list = document.getElementById('personList');
  list.innerHTML = '';
  const others = [...onlineUsers.entries()].filter(([id])=> id !== myIdentity);
  if(others.length === 0){
    list.innerHTML = '<div class="empty-msg">şu an çevrimiçi başka kimse yok</div>';
    return;
  }
  others.forEach(([identity, name])=>{
    const row = document.createElement('div');
    row.className = 'person';
    row.innerHTML = `<div><div class="pname">${escapeHtml(name)}</div><div class="ptag">ÇEVRİMİÇİ</div></div><div class="ptag">ARA →</div>`;
    row.addEventListener('click', ()=> callPerson(identity, name));
    list.appendChild(row);
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- KANALA KATIL ---------------- */
async function joinChannel(num){
  const roomName = 'kanal-' + num;
  await switchToRoom(roomName, 'channel', 'KANAL ' + num.toString().padStart(2,'0'));
  activeChannelNumber = num;
  document.querySelectorAll('.ch-btn').forEach(b=>{
    b.classList.toggle('active', Number(b.dataset.ch) === num);
  });
}

/* ---------------- ŞAHSİ ARAMA ---------------- */
function callPerson(identity, name){
  const roomName = 'dm-' + [myIdentity, identity].sort().join('-');
  if(lobbyRoom){
    const payload = new TextEncoder().encode(JSON.stringify({
      type:'call-invite', fromName: myDisplayName, roomName
    }));
    lobbyRoom.localParticipant.publishData(payload, { destinationIdentities:[identity] });
  }
  toast(name + ' aranıyor…');
  switchToRoom(roomName, 'dm', name.toUpperCase());
}

function showInvite(fromName, roomName){
  const box = document.getElementById('invite');
  document.getElementById('inviteText').textContent = fromName.toUpperCase() + ' SİZİ ARIYOR';
  box.style.display = 'block';

  const accept = document.getElementById('inviteAccept');
  const decline = document.getElementById('inviteDecline');
  const cleanup = ()=>{ box.style.display='none'; accept.onclick=null; decline.onclick=null; };

  accept.onclick = ()=>{ cleanup(); switchToRoom(roomName, 'dm', fromName.toUpperCase()); };
  decline.onclick = cleanup;
}

/* ---------------- ODA DEĞİŞTİRME ---------------- */
async function switchToRoom(roomName, kind, label){
  if(activeRoomName === roomName) return;
  await leaveActiveRoom();

  setStatus('BAĞLANIYOR', false);
  try{
    const { token } = await fetchToken(roomName, myDisplayName);
    const room = new Room();
    await room.connect(LIVEKIT_URL, token);

    activeRoom = room;
    activeRoomName = roomName;
    activeRoomKind = kind;

    document.getElementById('lcdChannel').textContent = label;
    updateListenerCount();
    document.getElementById('lcdSub').textContent = kind === 'channel' ? 'kanal yayında' : 'şahsi hat açık';
    document.getElementById('pttBtn').disabled = false;
    document.getElementById('pttHint').textContent = 'basılı tut, konuş';
    document.getElementById('leaveBtn').style.display = 'inline-block';

    room.on(RoomEvent.TrackSubscribed, (track)=>{
      if(track.kind === Track.Kind.Audio){
        const el = track.attach();
        el.dataset.lk = 'remote-audio';
        document.body.appendChild(el);
      }
    });
    room.on(RoomEvent.TrackUnsubscribed, (track)=>{ track.detach().forEach(el=>el.remove()); });
    room.on(RoomEvent.ParticipantConnected, updateListenerCount);
    room.on(RoomEvent.ParticipantDisconnected, updateListenerCount);

    setStatus('BAĞLI', false);
  }catch(err){
    setStatus('HATA', false);
    toast('Bağlanılamadı: ' + (err.message || err));
  }
}

function updateListenerCount(){
  if(!activeRoom) return;
  document.getElementById('lcdCount').textContent = activeRoom.remoteParticipants.size;
}

async function leaveActiveRoom(){
  if(isTransmitting) await stopTransmitting();
  if(activeRoom){
    await activeRoom.disconnect();
    activeRoom = null;
  }
  activeRoomName = null;
  activeRoomKind = null;
  activeChannelNumber = null;
  document.getElementById('lcdChannel').textContent = '— — —';
  document.getElementById('lcdCount').textContent = '0';
  document.getElementById('lcdSub').textContent = 'seçim bekleniyor';
  document.getElementById('pttBtn').disabled = true;
  document.getElementById('pttHint').textContent = 'bir kanal veya kişi seç';
  document.getElementById('leaveBtn').style.display = 'none';
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
}

document.getElementById('leaveBtn').addEventListener('click', leaveActiveRoom);

/* ---------------- PUSH TO TALK ---------------- */
const pttBtn = document.getElementById('pttBtn');
['mousedown','touchstart'].forEach(ev=> pttBtn.addEventListener(ev, e=>{ e.preventDefault(); startTransmitting(); }));
['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=> pttBtn.addEventListener(ev, e=>{ e.preventDefault(); stopTransmitting(); }));

async function startTransmitting(){
  if(!activeRoom || isTransmitting) return;
  isTransmitting = true;
  pttBtn.classList.add('active');
  setStatus('YAYINDA', true);

  try{
    if(!micTrack){
      const tracks = await createLocalTracks({ audio:true, video:false });
      micTrack = tracks[0];
    }
    await activeRoom.localParticipant.publishTrack(micTrack);
    startWaveform(micTrack.mediaStreamTrack);
  }catch(err){
    toast('Mikrofon açılamadı: ' + (err.message || err));
    isTransmitting = false;
    pttBtn.classList.remove('active');
    setStatus('BAĞLI', false);
  }
}

async function stopTransmitting(){
  if(!isTransmitting) return;
  isTransmitting = false;
  pttBtn.classList.remove('active');
  setStatus('BAĞLI', false);
  stopWaveform();
  if(activeRoom && micTrack){
    try{ await activeRoom.localParticipant.unpublishTrack(micTrack); }catch(e){}
  }
}

function setStatus(text, transmitting){
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.classList.remove('live','tx');
  if(transmitting) dot.classList.add('tx');
  else if(text === 'BAĞLI' || text === 'YAYINDA') dot.classList.add('live');
}

/* ---------------- WAVEFORM ---------------- */
function startWaveform(mediaStreamTrack){
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(new MediaStream([mediaStreamTrack]));
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);

  function draw(){
    waveformRAF = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const barW = canvas.width / data.length * 2.5;
    let x = 0;
    for(let i=0;i<data.length;i+=4){
      const h = (data[i]/255) * canvas.height;
      ctx.fillStyle = '#3ddc5a';
      ctx.fillRect(x, canvas.height - h, barW-2, h);
      x += barW;
      if(x > canvas.width) break;
    }
  }
  draw();
}

function stopWaveform(){
  if(waveformRAF) cancelAnimationFrame(waveformRAF);
  const canvas = document.getElementById('waveform');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  if(audioCtx){ audioCtx.close(); audioCtx = null; }
}

window.addEventListener('beforeunload', ()=>{
  if(lobbyRoom) lobbyRoom.disconnect();
  if(activeRoom) activeRoom.disconnect();
});
</script>
